name: PR
on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: read

jobs:
  lint:
    runs-on: blacksmith-32vcpu-ubuntu-2404
    steps:
      - uses: amannn/action-semantic-pull-request@0b14f54ac155d88e12522156e52cb6e397745cfd
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
